# This workflow will setup Pages, install dependencies, 
# build with Astro and run local tests
name: Tests Deployment

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  id-token: write

env:
  BUILD_PATH: '.' # default value when not using subfolders
  # BUILD_PATH: subfolder

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install, build and upload site
        uses: withastro/action@v6

  test-local:
    name: Local Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download Astro dist folder
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: dist

      - name: Extract contents to dist folder
        run: |
          cd dist
          tar -xf artifact.tar
          rm artifact.tar
          cd ..

      - name: Run Vitest
        run: npx vitest

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload local report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-local-report
          path: playwright-report/
          retention-days: 7
